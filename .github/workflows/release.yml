name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Create GitHub release
    runs-on: windows-latest
    needs: []
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: python -m PyInstaller SmartStudyPlanner.spec --distpath .

      - name: Rename artifact
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          Rename-Item SmartStudyPlanner.exe "SmartStudyPlanner-${tag}-windows-x64.exe"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: SmartStudyPlanner-*-windows-x64.exe
          body_path: docs/releases/${{ github.ref_name }}.md
          generate_release_notes: false
          draft: true
