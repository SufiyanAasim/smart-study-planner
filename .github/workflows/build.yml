name: Build

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    name: Build Windows executable
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: python -m PyInstaller SmartStudyPlanner.spec

      - name: Rename artifact
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          Rename-Item SmartStudyPlanner.exe "SmartStudyPlanner-${tag}-windows-x64.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartStudyPlanner-windows
          path: SmartStudyPlanner-*-windows-x64.exe
